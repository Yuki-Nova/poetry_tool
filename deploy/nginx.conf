# ============================================================
# Poetry Tool — Nginx 配置片段
# 合并到现有 /etc/nginx/conf.d/yukinova.conf 中
# ============================================================

# ── 1. admin 后台（子域名） ──
server {
    listen 80;
    server_name admin.yukinova.top;

    # 可选：加 HTTP Basic Auth 保护后台
    # auth_basic "Admin Area";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    root /var/www/poetry-tool/admin/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ── 2. 主域名（博客 + 工具 + API） ──
server {
    listen 80;
    server_name yukinova.top;

    # ... 现有 Hexo 配置保持不变 ...

    # poetry tool 静态产物
    location /poetry {
        alias /var/www/poetry-tool/tool/dist;
        try_files $uri $uri/ /poetry/poetry-tool.js;
    }

    # API 反向代理到 Express
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
